<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Fashion | Premium Clothing & Style</title>
    <meta name="description" content="Shop the latest in premium affordable fashion. Men and Women collections available.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Outfit', sans-serif; }
        .hidden-section { display: none; }
        .active-section { display: block; animation: fadeIn 0.4s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-white text-black">

    <nav class="fixed top-0 w-full bg-white/80 backdrop-blur-md z-50 border-b border-gray-100">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-xl font-bold tracking-tighter cursor-pointer" onclick="showSection('home')">SMART FASHION</div>
            <div class="flex gap-6 text-xs font-bold uppercase tracking-widest">
                <button onclick="showSection('men')" class="hover:opacity-50">Men</button>
                <button onclick="showSection('women')" class="hover:opacity-50">Women</button>
                <button onclick="showSection('cart')" class="relative hover:opacity-50">
                    Cart (<span id="cart-count">0</span>)
                </button>
            </div>
        </div>
    </nav>

    <main class="pt-20">
        <section id="home" class="active-section">
            <div class="relative h-[80vh] bg-gray-900 flex items-center justify-center text-center text-white">
                <img src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d?auto=format&fit=crop&w=1600&q=80" class="absolute inset-0 w-full h-full object-cover opacity-50" alt="Hero">
                <div class="relative z-10 px-6">
                    <h1 class="text-5xl md:text-7xl font-bold uppercase mb-4">The New Standard</h1>
                    <p class="text-lg mb-8 font-light italic">Premium Quality. Transparent Pricing.</p>
                    <button onclick="showSection('men')" class="bg-white text-black px-10 py-4 text-xs font-bold uppercase tracking-widest hover:bg-black hover:text-white transition-all">Explore Collection</button>
                </div>
            </div>
        </section>

        <section id="men" class="hidden-section container mx-auto px-6 py-16">
            <h2 class="text-3xl font-bold uppercase mb-12 border-b pb-4 text-center">Men's Essentials</h2>
            <div id="men-grid" class="grid grid-cols-2 lg:grid-cols-4 gap-8">
                </div>
        </section>

        <section id="women" class="hidden-section container mx-auto px-6 py-32 text-center">
            <h2 class="text-4xl font-bold uppercase">Coming Soon</h2>
            <p class="text-gray-400 mt-4">We are curating the finest collection for you.</p>
        </section>

        <section id="cart" class="hidden-section container mx-auto px-6 py-16 max-w-4xl">
            <h2 class="text-3xl font-bold uppercase mb-8">Your Bag</h2>
            <div id="cart-items" class="space-y-6 border-t pt-6"></div>
            <div id="cart-total" class="mt-8 text-right text-xl font-bold uppercase"></div>
            <button id="checkout-btn" onclick="showSection('checkout')" class="hidden w-full bg-black text-white py-4 mt-8 font-bold uppercase tracking-widest">Proceed to Checkout</button>
        </section>

        <section id="checkout" class="hidden-section container mx-auto px-6 py-16 max-w-xl">
            <h2 class="text-3xl font-bold uppercase mb-8">Checkout</h2>
            <form onsubmit="handleCheckout(event)" class="space-y-4">
                <input id="cust-name" type="text" placeholder="Full Name" required class="w-full border p-4 focus:border-black outline-none">
                <input id="cust-phone" type="tel" placeholder="Phone Number" required class="w-full border p-4 focus:border-black outline-none">
                <textarea id="cust-addr" placeholder="Full Delivery Address" required class="w-full border p-4 focus:border-black outline-none"></textarea>
                <div class="p-4 bg-gray-50 border">
                    <p class="text-xs font-bold uppercase text-gray-400 mb-2">Payment</p>
                    <p class="font-medium">Cash on Delivery (COD)</p>
                </div>
                <button type="submit" class="w-full bg-green-600 text-white py-4 font-bold uppercase tracking-widest hover:bg-green-700">Order via WhatsApp</button>
            </form>
        </section>
    </main>

    <script>
        // REPLACE THIS with the actual seller's WhatsApp number
        const WHATSAPP_NUMBER = "8801759752052"; 

        const products = [
            { id: 1, name: "Essential White Tee", price: 690, img: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=500" },
            { id: 2, name: "Premium Navy Polo", price: 980, img: "https://images.unsplash.com/photo-1581655353564-df123a1eb820?w=500" },
            { id: 3, name: "Oversized Black Hoodie", price: 1100, img: "https://images.unsplash.com/photo-1556821840-3a63f95609a7?w=500" },
            { id: 4, name: "Raw Denim Slim Fit", price: 1290, img: "https://images.unsplash.com/photo-1542272604-787c3835535d?w=500" }
        ];

        let cart = [];

        function showSection(id) {
            document.querySelectorAll('section').forEach(s => s.classList.replace('active-section', 'hidden-section'));
            document.getElementById(id).classList.replace('hidden-section', 'active-section');
            window.scrollTo(0,0);
        }

        function renderProducts() {
            const grid = document.getElementById('men-grid');
            grid.innerHTML = products.map(p => `
                <div class="group cursor-pointer" onclick="addToCart(${p.id})">
                    <div class="aspect-[3/4] overflow-hidden bg-gray-100 mb-4">
                        <img src="${p.img}" class="w-full h-full object-cover group-hover:scale-105 transition-transform">
                    </div>
                    <h3 class="text-xs font-bold uppercase tracking-widest">${p.name}</h3>
                    <p class="text-sm text-gray-500 mt-1">${p.price} BDT</p>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            cart.push(product);
            alert(`${product.name} added to bag!`);
            updateCart();
        }

        function updateCart() {
            document.getElementById('cart-count').innerText = cart.length;
            const container = document.getElementById('cart-items');
            if(cart.length === 0) {
                container.innerHTML = "<p class='text-gray-400'>Your bag is empty.</p>";
                document.getElementById('checkout-btn').style.display = 'none';
                return;
            }
            container.innerHTML = cart.map((item, index) => `
                <div class="flex justify-between items-center border-b pb-4">
                    <div>
                        <p class="font-bold uppercase text-sm">${item.name}</p>
                        <p class="text-gray-500">${item.price} BDT</p>
                    </div>
                    <button onclick="removeFromCart(${index})" class="text-red-500 text-xs uppercase font-bold">Remove</button>
                </div>
            `).join('');
            
            const total = cart.reduce((acc, curr) => acc + curr.price, 0);
            document.getElementById('cart-total').innerText = `Total: ${total} BDT`;
            document.getElementById('checkout-btn').style.display = 'block';
        }

        function removeFromCart(idx) {
            cart.splice(idx, 1);
            updateCart();
        }

        function handleCheckout(e) {
            e.preventDefault();
            const name = document.getElementById('cust-name').value;
            const phone = document.getElementById('cust-phone').value;
            const addr = document.getElementById('cust-addr').value;
            const total = cart.reduce((acc, curr) => acc + curr.price, 0);

            let itemList = cart.map(item => `- ${item.name} (${item.price} BDT)`).join('%0A');
            
            // WHATSAPP API LOGIC - Makes it professional
            const message = `*NEW ORDER FROM SMART FASHION*%0A%0A` +
                            `*Customer:* ${name}%0A` +
                            `*Phone:* ${phone}%0A` +
                            `*Address:* ${addr}%0A%0A` +
                            `*Items:*%0A${itemList}%0A%0A` +
                            `*Total Amount:* ${total} BDT%0A%0A` +
                            `Please confirm my order.`;

            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${message}`, '_blank');
        }

        renderProducts();
    </script>
</body>
  </html>
