
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Fashion | Designer Series</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        premium_teal: '#0d9488',
                        premium_orange: '#f59e0b',
                    },
                    fontFamily: { outfit: ['Outfit', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Outfit', sans-serif; transition: background-color 0.5s ease; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.2); }
        .dark .glass { background: rgba(15, 15, 15, 0.8); border: 1px solid rgba(255,255,255,0.05); }
        .drawer-closed { transform: translateX(100%); }
        .drawer-open { transform: translateX(0); }
        .product-hover:hover img { transform: scale(1.08); filter: brightness(0.8); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-black dark:text-white">

    <nav class="fixed top-6 left-1/2 -translate-x-1/2 w-[90%] max-w-5xl glass z-50 rounded-2xl px-8 py-4 flex justify-between items-center shadow-xl">
        <div class="text-2xl font-extrabold tracking-tighter cursor-pointer group" onclick="showSection('home')">
            ELITE<span class="text-premium_teal group-hover:text-premium_orange transition-colors">STUDIO</span>
        </div>
        
        <div class="flex items-center gap-8 font-semibold text-xs uppercase tracking-[0.2em]">
            <button onclick="showSection('men')" class="hover:text-premium_teal transition">Collection</button>
            <button onclick="showSection('cart')" class="relative hover:text-premium_teal transition">
                Bag (<span id="cart-count">0</span>)
            </button>
            <button onclick="toggleDrawer()" class="p-2 hover:bg-slate-200 dark:hover:bg-zinc-800 rounded-full transition">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 10c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0-6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 12c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
            </button>
        </div>
    </nav>

    <div id="settings-drawer" class="fixed top-0 right-0 h-full w-80 glass z-[60] drawer-closed transition-transform duration-500 p-10 shadow-2xl">
        <button onclick="toggleDrawer()" class="absolute top-6 right-6 text-2xl">&times;</button>
        <h3 class="text-xl font-bold mb-8 border-b pb-4">Preferences</h3>
        <div class="space-y-6">
            <div class="flex justify-between items-center">
                <span class="font-semibold text-sm uppercase">Appearance</span>
                <button onclick="toggleTheme()" class="bg-premium_teal text-white px-4 py-2 rounded-lg text-[10px] font-bold uppercase tracking-widest hover:bg-premium_orange transition">Toggle Mode</button>
            </div>
            <p class="text-[10px] opacity-50 leading-relaxed uppercase tracking-widest">Elite Studio v2.0 - Designed for Premium Fashion Merchants.</p>
        </div>
    </div>

    <main class="pt-32">
        <section id="home" class="active-section px-6 md:px-20">
            <div class="relative h-[70vh] rounded-[40px] overflow-hidden group">
                <img src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d?auto=format&fit=crop&w=1600" class="w-full h-full object-cover transition duration-1000 group-hover:scale-105">
                <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent flex flex-col justify-end p-12 text-white">
                    <span class="text-premium_orange font-bold uppercase tracking-[0.4em] mb-4 text-xs">New Era 2026</span>
                    <h1 class="text-6xl font-extrabold leading-none mb-8">PURE<br>LUXURY.</h1>
                    <button onclick="showSection('men')" class="w-fit bg-white text-black px-12 py-5 rounded-full font-bold uppercase text-[10px] tracking-[0.2em] hover:bg-premium_teal hover:text-white transition-all shadow-xl">Enter Shop</button>
                </div>
            </div>
        </section>

        <section id="men" class="hidden-section px-6 md:px-20 py-20">
            <div class="flex justify-between items-end mb-16">
                <h2 class="text-4xl font-bold italic uppercase tracking-tighter">Curated Essentials</h2>
                <span class="text-xs opacity-40 uppercase tracking-widest">Handpicked by Designers</span>
            </div>
            <div id="men-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-12"></div>
        </section>

        <section id="cart" class="hidden-section px-6 md:px-20 py-20 max-w-4xl mx-auto">
            <h2 class="text-5xl font-extrabold mb-12 uppercase italic tracking-tighter">Your Bag</h2>
            <div id="cart-container" class="glass rounded-3xl p-10 shadow-inner"></div>
        </section>
    </main>

    <script>
        // CORE LOGIC
        function toggleTheme() { document.documentElement.classList.toggle('dark'); }
        function toggleDrawer() { document.getElementById('settings-drawer').classList.toggle('drawer-closed'); }
        function showSection(id) {
            document.querySelectorAll('section').forEach(s => s.classList.replace('active-section', 'hidden-section'));
            document.getElementById(id).classList.replace('hidden-section', 'active-section');
            if (id !== 'home') toggleDrawer(); // Close drawer on navigation
            window.scrollTo(0,0);
        }

        const products = [
            { id: 1, name: "Midnight Stealth Tee", price: 1200, img: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=600" },
            { id: 2, name: "Desert Sand Oxford", price: 2400, img: "https://images.unsplash.com/photo-1581655353564-df123a1eb820?w=600" },
            { id: 3, name: "Obsidian Denims", price: 3500, img: "https://images.unsplash.com/photo-1542272604-787c3835535d?w=600" },
            { id: 4, name: "Urban Chrome Jacket", price: 5800, img: "https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=600" }
        ];

        let cart = [];

        function render() {
            document.getElementById('men-grid').innerHTML = products.map(p => `
                <div class="product-hover cursor-pointer group" onclick="addToCart(${p.id})">
                    <div class="aspect-[4/5] overflow-hidden rounded-[30px] mb-6 bg-slate-200 shadow-lg">
                        <img src="${p.img}" class="w-full h-full object-cover transition-transform duration-700">
                    </div>
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="font-bold text-lg uppercase tracking-tight">${p.name}</h3>
                            <p class="text-xs opacity-50 uppercase tracking-widest font-semibold mt-1">Limited Edition</p>
                        </div>
                        <span class="text-premium_teal font-extrabold">${p.price} BDT</span>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id) {
            cart.push(products.find(p => p.id === id));
            document.getElementById('cart-count').innerText = cart.length;
            updateCart();
            alert("Added to Bag");
        }

        function updateCart() {
            const container = document.getElementById('cart-container');
            if(cart.length === 0) { container.innerHTML = "<p class='opacity-40 uppercase tracking-widest text-center py-20'>Your collection is currently empty.</p>"; return; }
            let total = cart.reduce((s, i) => s + i.price, 0);
            container.innerHTML = `
                <div class="space-y-8">
                    ${cart.map((item, i) => `<div class="flex justify-between items-center"><span class="font-bold uppercase tracking-widest text-sm">${item.name}</span><b class="text-premium_teal">${item.price} BDT</b></div>`).join('')}
                    <div class="border-t border-slate-200 dark:border-zinc-700 pt-8 mt-8 flex justify-between items-center">
                        <span class="text-2xl font-bold uppercase italic tracking-tighter">Subtotal</span>
                        <span class="text-3xl font-extrabold text-premium_orange">${total} BDT</span>
                    </div>
                    <button class="w-full bg-black dark:bg-white text-white dark:text-black py-6 rounded-full font-bold uppercase tracking-[0.3em] text-[10px] hover:bg-premium_teal dark:hover:bg-premium_teal transition-all">Proceed to Checkout</button>
                </div>
            `;
        }
        render();
    </script>

    <div style="position: fixed; bottom: 30px; right: 30px; z-index: 100;">
        <a href="https://wa.me/8801759752052" target="_blank" class="flex items-center gap-3 bg-premium_teal text-white px-6 py-4 rounded-full shadow-2xl hover:scale-105 transition-transform font-bold text-[10px] uppercase tracking-widest">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="20" height="20">
            Designer Support
        </a>
    </div>

</body>
</html>
